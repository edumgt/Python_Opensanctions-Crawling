title: Naver Finance Stock Information Crawler
entry_point: crawler.py
prefix: naver-finance-stock
ci_test: false

coverage:
  frequency: daily
  start: 2026-05-07

summary: >
  네이버 금융(finance.naver.com) 시가총액 페이지에서 주식 정보를 수집하는 크롤러입니다.
  시장(KOSPI/KOSDAQ) 기준으로 종목명, 현재가, 등락률, 거래량, 시가총액 등을 수집합니다.

description: |
  ## 개요
  네이버 금융은 국내 주식 시장 정보를 제공하는 대표 금융 포털입니다.
  본 크롤러는 시가총액 페이지의 종목 테이블을 파싱하여 주요 시세 정보를 수집합니다.

  ## 크롤링 방식
  - **HTML 파싱 기반 크롤링**: 시가총액 페이지(`sise_market_sum.naver`)의 테이블에서 종목 정보 추출

  ## 수집 데이터
  - 종목 코드 (code)
  - 종목명 (name)
  - 시장 구분 (market)
  - 현재가 (current_price)
  - 등락률 (change_rate)
  - 거래량 (volume)
  - 시가총액 (market_cap)

  ## 주의사항
  - robots.txt 및 이용약관을 준수하여 적절한 딜레이를 두고 요청합니다.
  - 수집한 데이터는 학습·연구 목적으로만 사용해야 합니다.

publisher:
  name: 네이버 주식회사
  name_en: Naver Corporation
  description: |
    네이버 금융은 대한민국 주식 시장의 종목별 시세, 차트,
    재무 지표 및 뉴스 정보를 제공하는 금융 정보 서비스입니다.
  country: kr
  url: https://finance.naver.com
  official: false

tags:
  - finance
  - stock
  - kospi
  - kosdaq

url: https://finance.naver.com/sise/sise_market_sum.naver

data:
  url: https://finance.naver.com/sise/sise_market_sum.naver
  format: HTML
  lang: kor

# ---------------------------------------------------------------------------
# 크롤러 설정 (crawler.py에서 context.dataset.config로 접근)
# ---------------------------------------------------------------------------
config:
  market: "KOSPI"
  max_pages: 1
